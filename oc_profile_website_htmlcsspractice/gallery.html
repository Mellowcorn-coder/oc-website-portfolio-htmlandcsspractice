<!DOCTYPE html>
<html>
<head>

    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <title>Gallery</title>
    <style>

        body{
    font-family: "Source Sans Pro", sans-serif;
}

*{ 
    padding:0;
    margin:0;
    box-sizing: border-box;

}

.Menu ul{
    background-color: rgb(255, 255, 255);
    list-style: none;
    text-align: center;

}

.Menu ul li {
    display: inline-block;
    position: relative;
}

.Menu ul li a {
    text-decoration: none;
    padding: 20px;
    color: rgb(0, 0, 0);
    display: block;
    font-size: 1rem;
}

.Menu ul li ul.dropdown li{
    display: block;
}

.Menu ul li ul.dropdown{
    position: absolute;
    background-color: rgba(145, 145, 145, 0.655);
    display:none;

}

.Menu ul li ul.dropdown li a {
    color: white;
}

.Menu ul li:hover {
    background-color: rgb(186, 184, 255);
}

.Menu ul li:hover ul.dropdown {
    display:block;
}

.hero {
    text-align: center;
    font-size: 1rem;
    color: white;
    background-image: linear-gradient( to left, pink,rgb(191, 126, 255), rgb(109, 109, 255),rgb(138, 212, 255));
    padding: 80px;

}

.images {
    display:grid;
    grid-template-columns: repeat(auto-fit, 300px);
    justify-content: center;
    gap:30px;
    padding: 15px;

}

.images img{
    background-color: rgb(189, 211, 255);
    padding:15px;
    width:300px;
    border-radius: 15px;
    transition: all 0.3s ease-out;
}

.images img:hover {
    transform: rotate(6deg);
}

</style>
</head>
