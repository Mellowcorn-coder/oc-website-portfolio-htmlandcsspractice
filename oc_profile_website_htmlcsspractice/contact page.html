body{

}

*{

    margin:0;
    box-sizing: border-box;

}

.Menu ul{
    background-color: rgb(255, 255, 255);
    list-style: none;
    text-align: center;

}

.Menu ul li {
    display: inline-block;
    position: relative;
}

.Menu ul li a {
    text-decoration: none;
    padding: 20px;
    color: rgb(0, 0, 0);
    display: block;
    font-size: 1rem;
}

.Menu ul li ul.dropdown li{
    display: block;
}

.Menu ul li ul.dropdown{
    position: absolute;
    background-color: rgba(145, 145, 145, 0.655);
    display:none;

}

.Menu ul li ul.dropdown li a {
    color: white;
}

.Menu ul li:hover {
    background-color: rgb(186, 184, 255);
}

.Menu ul li:hover ul.dropdown {
    display:block;
}

.hero {
    text-align: center;

}

.group {
    margin-bottom: 30px;
}

.contact form{
    text-align: center;
    padding: 100px;
    margin:50px;
    font-size: 1.5rem;
    line-height: 10px;
    background-color: rgb(161, 214, 255);
    border-radius: 20px;
}
